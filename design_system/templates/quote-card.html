<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Card - Design System</title>
  <link rel="stylesheet" href="../colors.css">
  <link rel="stylesheet" href="../typography.css">
  <link rel="stylesheet" href="../components.css">
  <link rel="stylesheet" href="../animations.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-primary);
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }

    .tiktok-frame {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background: var(--gradient-ocean);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .quote-container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 120px 80px 140px;
      text-align: center;
    }

    .quote-decoration {
      font-size: 200px;
      color: rgba(255, 255, 255, 0.2);
      line-height: 1;
      margin-bottom: 40px;
    }

    .quote-text {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: var(--font-bold);
      color: var(--color-white);
      line-height: var(--leading-relaxed);
      margin-bottom: 40px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
    }

    .quote-text .highlight {
      background: var(--color-accent-500);
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
    }

    .quote-author {
      font-size: var(--text-xl);
      font-weight: var(--font-medium);
      color: rgba(255, 255, 255, 0.9);
    }

    .quote-author::before {
      content: '— ';
    }

    /* Decoration Elements */
    .decoration-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
    }

    .circle-1 {
      width: 300px;
      height: 300px;
      top: 100px;
      right: -100px;
    }

    .circle-2 {
      width: 200px;
      height: 200px;
      bottom: 200px;
      left: -50px;
    }

    /* Animations */
    .quote-text {
      animation: fadeInUp 0.6s var(--ease-bounce-out) forwards;
    }

    .quote-author {
      animation: fadeInUp 0.6s var(--ease-bounce-out) 0.2s forwards;
      opacity: 0;
    }

    .quote-decoration {
      animation: fadeInDown 0.6s var(--ease-bounce-out) forwards;
    }
  </style>
</head>
<body>
  <div class="tiktok-frame">
    <!-- Background Decorations -->
    <div class="decoration-circle circle-1"></div>
    <div class="decoration-circle circle-2"></div>

    <div class="quote-container">
      <div class="quote-decoration">❝</div>
      
      <p class="quote-text">
        The only way to do great work is to
        <span class="highlight">love what you do</span>
      </p>
      
      <p class="quote-author">Steve Jobs</p>
    </div>
  </div>
</body>
</html>
